context:
  name: glycin
  version: "2.2.alpha.4"
  version_majmin: ${{ (version | split('.'))[:2] | join('.') }}

recipe:
  name: glycin_and_loaders
  version: ${{ version }}

source:
  url: https://download.gnome.org/sources/glycin/${{ version_majmin }}/glycin-${{ version }}.tar.xz
  sha256: 568c22d6da8ff35b91c6e6aadae7a59c17a4b90c9c4928e0f61dd3a3171ab178
  patches:
    - patches/0001-non-linux-fixes.patch

build:
  number: 3

outputs:

  - package:
      name: ${{ name|lower }}
    build:
      script:
      - if: win
        then: |
          meson setup %MESON_ARGS% ^
            --prefix=%LIBRARY_PREFIX% ^
            --default-library=shared ^
            --wrap-mode=nofallback ^
            -Dvapi=false ^
            -Dtests=false ^
            -Dglycin-thumbnailer=false ^
            -Dglycin-loaders=false ^
            -Dlibglycin=true ^
            -Dlibglycin-gtk4=false ^
            -Dintrospection=false ^
            builddir
          ninja -v -C builddir -j %CPU_COUNT%
          copy "builddir\cargo-target\release\glycin.dll.lib" "builddir\libglycin\glycin-2.lib"
          ninja -C builddir install -j %CPU_COUNT%
      - if: unix
        then: |
          meson setup ${MESON_ARGS} \
              --prefix=$PREFIX \
              --default-library=shared \
              --wrap-mode=nofallback \
              -Dvapi=false \
              -Dtests=false \
              -Dglycin-thumbnailer=false \
              -Dglycin-loaders=false \
              -Dlibglycin=true \
              -Dlibglycin-gtk4=false \
              $([ "$(uname)" != "Linux" ] && echo "-Dintrospection=false") \
              builddir
          ninja -v -C builddir -j ${CPU_COUNT}
          ninja -C builddir install -j ${CPU_COUNT}
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib('c') }}
        - gobject-introspection
        - meson >=0.63.0
        - ninja
        - pkg-config
        - rust
      host:
        - expat
        - fontconfig
        - freetype
        - glib
        - gobject-introspection
        - lcms2
        - zlib
        - if: linux
          then:
            - libseccomp
      run_exports:
        - ${{ pin_subpackage('glycin', upper_bound='x.x') }}
      ignore_run_exports:
        by_name:
          - libexpat
          - libfreetype6
          - libzlib
    tests:
      - package_contents:
          lib:
            - if: not win
              then: libglycin-2
          files:
            - if: win
              then: Library/bin/glycin-2-0.dll

  - package:
      name: ${{ name|lower }}-loaders
    build:
      skip:
        - not linux
      script: |
        meson setup ${MESON_ARGS} \
            --prefix=$PREFIX \
            --default-library=shared \
            --wrap-mode=nofallback \
            -Dvapi=false \
            -Dtests=false \
            -Dglycin-thumbnailer=false \
            -Dglycin-loaders=true \
            -Dlibglycin=false \
            -Dlibglycin-gtk4=false \
            builddir
        ninja -v -C builddir -j ${CPU_COUNT}
        ninja -C builddir install -j ${CPU_COUNT}
        # Set GLYCIN_DATA_DIR to use loaders from conda environment
        mkdir -p $PREFIX/etc/conda/activate.d
        echo 'export GLYCIN_DATA_DIR="$CONDA_PREFIX/share"' > $PREFIX/etc/conda/activate.d/glycin-loaders.sh
        mkdir -p $PREFIX/etc/conda/deactivate.d
        echo 'unset GLYCIN_DATA_DIR' > $PREFIX/etc/conda/deactivate.d/glycin-loaders.sh
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib('c') }}
        - gettext
        - gobject-introspection
        - meson >=0.63.0
        - ninja
        - pkg-config
        - rust
      host:
        - cairo
        - expat
        - freetype
        - glib
        - gobject-introspection
        - libheif
        - libjxl
        - librsvg
        - libxml2-devel
        - xorg-xorgproto
        - libseccomp
        - zlib
      run_exports:
        - ${{ pin_subpackage('glycin-loaders', upper_bound='x.x') }}
      ignore_run_exports:
        by_name:
          - libexpat
          - libfreetype6
          - libxml2-16
          - libzlib
          - libseccomp
    tests:
      - package_contents:
          files:
            - libexec/glycin-loaders/2+/glycin-heif
            - libexec/glycin-loaders/2+/glycin-image-rs
            - libexec/glycin-loaders/2+/glycin-jxl
            - libexec/glycin-loaders/2+/glycin-svg

  - package:
      name: ${{ name|lower }}-gtk4
    build:
      script:
      - if: win
        then: |
          meson setup %MESON_ARGS% ^
            --prefix=%LIBRARY_PREFIX% ^
            --default-library=shared ^
            --wrap-mode=nofallback ^
            -Dvapi=false ^
            -Dtests=false ^
            -Dglycin-thumbnailer=false ^
            -Dglycin-loaders=false ^
            -Dlibglycin=false ^
            -Dlibglycin-gtk4=true ^
            -Dintrospection=false ^
            builddir
          ninja -v -C builddir -j %CPU_COUNT%
          copy "builddir\cargo-target\release\glycin_gtk4.dll.lib" "builddir\libglycin\glycin-gtk4-2.lib"
          ninja -C builddir install -j %CPU_COUNT%
      - if: unix
        then: |
          meson setup ${MESON_ARGS} \
              --prefix=$PREFIX \
              --default-library=shared \
              --wrap-mode=nofallback \
              -Dvapi=false \
              -Dtests=false \
              -Dglycin-thumbnailer=false \
              -Dglycin-loaders=false \
              -Dlibglycin=false \
              -Dlibglycin-gtk4=true \
              $([ "$(uname)" != "Linux" ] && echo "-Dintrospection=false") \
              builddir
          ninja -v -C builddir -j ${CPU_COUNT}
          ninja -C builddir install -j ${CPU_COUNT}
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib('c') }}
        - gobject-introspection
        - meson >=0.63.0
        - ninja
        - pkg-config
        - rust
      host:
        - ${{ pin_subpackage('glycin', exact=True) }}
        - expat
        - freetype
        - glib
        - gobject-introspection
        - gtk4 >= 4.16.0
        - lcms2
        - zlib
        - if: linux
          then:
            - libseccomp
      run:
        - ${{ pin_subpackage('glycin', exact=True) }}
      run_exports:
        - ${{ pin_subpackage('glycin-gtk4', upper_bound='x.x') }}
      ignore_run_exports:
        by_name:
          - libexpat
          - libfreetype6
          - libzlib
          - lcms2
          - libseccomp
    tests:
      - package_contents:
          lib:
            - if: not win
              then: libglycin-gtk4-2
          files:
            - if: win
              then: Library/bin/glycin-gtk4-2-0.dll

about:
  homepage: https://gitlab.gnome.org/GNOME/glycin
  summary: 'Sandboxed and extendable image loading'
  description: |
    Glycin allows to decode, edit, and create images and
    read metadata. The decoding happens in sandboxed modular
    image loaders and editors.
  license: LGPL-2.1-or-later
  license_file: LICENSE-LGPL-2.1
  repository: https://gitlab.gnome.org/GNOME/glycin

extra:
  recipe-maintainers:
    - haecker-felix
    - danyeaw
    - Hofer-Julian
